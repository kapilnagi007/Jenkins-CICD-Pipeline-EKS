apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app

    spec:
      containers:
      - name: react-app
        image: kopilnagi/june-batch-cicd:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80